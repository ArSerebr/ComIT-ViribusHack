---
kind: pipeline
type: docker
name: checks

trigger:
  event: [push, pull_request]
  branch:
    include: [main, master, develop, feature/*, fix/*, dev]

platform:
  os: linux
  arch: amd64

volumes:
  - name: drone-dotenv
    host:
      path: /home/s1rne/drone-configs/${DRONE_REPO_NAME}/.env

steps:
  - name: backend-lint
    image: python:3.12-slim
    commands:
      - pip install --no-cache-dir "ruff==0.8.4"
      - ruff check backend/app backend/tests --output-format=concise

  - name: backend-test
    image: python:3.12-slim
    depends_on: [backend-lint]
    volumes:
      - name: drone-dotenv
        path: /drone-config/.env
    commands:
      - |
        set -e
        test -f /drone-config/.env || { echo >&2 "Нет .env на раннере: /home/s1rne/drone-configs/${DRONE_REPO_NAME}/.env"; exit 1; }
        set -a
        . /drone-config/.env
        set +a
        cd backend
        pip install --no-cache-dir -r requirements.txt -r requirements-dev.txt
        python -m pytest tests -v --cov=app --cov-report=term-missing --cov-report=xml

  # NODE_ENV=production на npm ci отключает devDependencies → vite не ставится.
  - name: frontend-build
    image: node:20-alpine
    depends_on: [backend-lint]
    volumes:
      - name: drone-dotenv
        path: /drone-config/.env
    commands:
      - |
        set -e
        test -f /drone-config/.env || { echo >&2 "Нет .env на раннере: /home/s1rne/drone-configs/${DRONE_REPO_NAME}/.env"; exit 1; }
        cp /drone-config/.env .env
        cd frontend
        npm ci
        NODE_ENV=production npm run build

---
kind: pipeline
type: docker
name: docker-build

trigger:
  event: [push]
  branch:
    include: [main, master]

depends_on: [checks]

platform:
  os: linux
  arch: amd64

volumes:
  - name: drone-dotenv
    host:
      path: /home/s1rne/drone-configs/${DRONE_REPO_NAME}/.env

services:
  - name: docker
    image: docker:24-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""

steps:
  - name: build-backend
    image: docker:24-cli
    volumes:
      - name: drone-dotenv
        path: /drone-config/.env
    environment:
      DOCKER_HOST: tcp://docker:2375
    commands:
      - |
        set -e
        test -f /drone-config/.env || { echo >&2 "Нет .env на раннере"; exit 1; }
        set -a
        . /drone-config/.env
        set +a
        docker build -t viribus-backend:${DRONE_COMMIT_SHA:0:7} ./backend

  - name: build-frontend
    image: docker:24-cli
    volumes:
      - name: drone-dotenv
        path: /drone-config/.env
    environment:
      DOCKER_HOST: tcp://docker:2375
    commands:
      - |
        set -e
        test -f /drone-config/.env || { echo >&2 "Нет .env на раннере"; exit 1; }
        set -a
        . /drone-config/.env
        set +a
        docker build -t viribus-frontend:${DRONE_COMMIT_SHA:0:7} ./frontend
    depends_on: [build-backend]

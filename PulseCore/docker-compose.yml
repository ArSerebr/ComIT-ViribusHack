services:
  mongo:
    image: mongo:7
    container_name: pulseai_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: "mgg"
      MONGO_INITDB_ROOT_PASSWORD: "070809"
    volumes:
      - mongo_data:/data/db
    networks:
      - pulseai_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  backend:
    build: .
    container_name: pulseai_backend
    restart: unless-stopped
    environment:
      - "MONGO_URL=mongodb://mgg:070809@mongo:27017/?authSource=admin"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - pulseai_net

  nginx:
    image: nginx:alpine
    container_name: pulseai_nginx
    restart: unless-stopped
    ports:
      - "8083:8000"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - pulseai_net

networks:
  pulseai_net:
    driver: bridge

volumes:
  mongo_data:

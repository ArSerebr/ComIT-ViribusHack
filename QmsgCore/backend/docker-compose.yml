version: "3.9"

# This compose file launches the Group Chat service alongside the existing
# QGramm backend. Both services share the same PostgreSQL database instance.
# Copy .env.example → .env and fill in the values before running.

services:

  # ── Shared database ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qgramm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qgramm
      POSTGRES_USER: qgramm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qgramm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qgramm -d qgramm"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - qgramm-net

  # ── Group Chat service ───────────────────────────────────────────────────────
  groupchat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qgramm-groupchat
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GC_ENV: production
      GC_SERVER_HOST: 0.0.0.0
      GC_SERVER_PORT: 8090
      GC_DATABASE_DSN: postgres://qgramm:${POSTGRES_PASSWORD:-qgramm}@postgres:5432/qgramm?sslmode=disable
      # Must match the QGramm backend JWT secret so tokens are interoperable.
      GC_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GC_JWT_ISSUER: qgramm-backend
      GC_ACCESS_TOKEN_TTL_HOURS: 168
      GC_PULSE_BASE_URL: ${PULSE_BASE_URL:-http://chat.droidje-cloud.ru}
      GC_PULSE_TASK_TIMEOUT_SEC: 120
    ports:
      - "${GROUPCHAT_PORT:-18090}:8090"
    networks:
      - qgramm-net

networks:
  qgramm-net:
    driver: bridge

volumes:
  postgres_data:

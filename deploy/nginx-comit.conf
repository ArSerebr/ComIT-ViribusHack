        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- SPA аналитики (frontend-analytics → 127.0.0.1:8081) ---
server {
    listen 443 ssl http2;
    server_name analytics.comit.robofirst.ru;

    ssl_certificate     /etc/letsencrypt/live/comit.robofirst.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/comit.robofirst.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;


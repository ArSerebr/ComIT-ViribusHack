# Nginx: comit, api, admin, analytics
# Скопировать на сервер:
#   sudo cp deploy/nginx-comit.conf /etc/nginx/sites-available/comit
#   sudo ln -sf /etc/nginx/sites-available/comit /etc/nginx/sites-enabled/comit
#   sudo nginx -t && sudo systemctl reload nginx
#
# Certbot (один SAN на все хосты):
#   sudo certbot certonly --webroot -w /var/www/certbot -d comit.robofirst.ru -d api.comit.robofirst.ru -d admin.comit.robofirst.ru -d analytics.comit.robofirst.ru --email YOUR@EMAIL --agree-tos --non-interactive

# HTTP → HTTPS редирект + ACME
server {
    listen 80;
    server_name comit.robofirst.ru api.comit.robofirst.ru admin.comit.robofirst.ru analytics.comit.robofirst.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# SPA (frontend контейнер → 8080)
server {
    listen 443 ssl http2;
    server_name comit.robofirst.ru;

    ssl_certificate     /etc/letsencrypt/live/comit.robofirst.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/comit.robofirst.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/comit-access.log;
    error_log  /var/log/nginx/comit-error.log;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API (backend контейнер → 8000)

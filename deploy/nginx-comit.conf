# Nginx: comit.robofirst.ru + api / admin / analytics
# На сервере:
#   sudo cp deploy/nginx-comit.conf /etc/nginx/sites-available/comit
#   sudo ln -sf /etc/nginx/sites-available/comit /etc/nginx/sites-enabled/comit
#   sudo nginx -t && sudo systemctl reload nginx
#
# Сертификаты Let's Encrypt (один SAN на все хосты):
#   sudo certbot certonly --nginx -d comit.robofirst.ru \
#     -d api.comit.robofirst.ru -d admin.comit.robofirst.ru -d analytics.comit.robofirst.ru
# Путь к ключу обычно: /etc/letsencrypt/live/comit.robofirst.ru/ (первое имя в списке -d)

# --- HTTP: ACME + редирект на HTTPS ---
server {
    listen 80;
    server_name comit.robofirst.ru api.comit.robofirst.ru admin.comit.robofirst.ru analytics.comit.robofirst.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Главный SPA (frontend → 127.0.0.1:8080) ---
server {
    listen 443 ssl http2;
    server_name comit.robofirst.ru;

    ssl_certificate     /etc/letsencrypt/live/comit.robofirst.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/comit.robofirst.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/comit-access.log;
    error_log  /var/log/nginx/comit-error.log;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- API FastAPI (backend → 127.0.0.1:8000) ---
server {
    listen 443 ssl http2;
    server_name api.comit.robofirst.ru;

    ssl_certificate     /etc/letsencrypt/live/comit.robofirst.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/comit.robofirst.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/comit-api-access.log;
    error_log  /var/log/nginx/comit-api-error.log;

    # Увеличить при больших телах (загрузки)
    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Django admin (admin-panel → 127.0.0.1:8010, внутри контейнера 8001) ---
server {
    listen 443 ssl http2;
    server_name admin.comit.robofirst.ru;

    ssl_certificate     /etc/letsencrypt/live/comit.robofirst.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/comit.robofirst.ru/privkey.pem;

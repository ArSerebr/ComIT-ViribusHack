# Переменные: скопируйте `.env.example` → `.env` в корне репозитория.
# Compose подставляет ${VAR} из окружения и из файла `.env`.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-comit}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-comit}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  mongo:
    image: mongo:7
    command: ["mongod", "--quiet"]
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    profiles: ["core"]
    # Стабильные имена для Drone cleanup и прод-деплоя (не default project_service).
    image: comit-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-comit}
      # Не из .env: там часто localhost для uvicorn на хосте; в сети compose хост Redis — имя сервиса `redis`.
      REDIS_URL: redis://redis:6379/0
      SQLALCHEMY_ECHO: ${SQLALCHEMY_ECHO:-false}
      # Обязателен только при запуске профиля `core`; по умолчанию профиль выключен.
      JWT_SECRET: ${JWT_SECRET:-disabled-core-jwt-secret}
      JWT_LIFETIME_SECONDS: ${JWT_LIFETIME_SECONDS:-3600}
      RESET_PASSWORD_TOKEN_SECRET: ${RESET_PASSWORD_TOKEN_SECRET:-}
      VERIFICATION_TOKEN_SECRET: ${VERIFICATION_TOKEN_SECRET:-}
      # 1 = пропустить seed при старте (по умолчанию seed выполняется после миграций)
      SKIP_SEED: ${SKIP_SEED:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      # В Docker backend и qmsg-core в одной сети; localhost не работает.
      QMSG_CORE_BASE_URL: http://qmsg-core:8090
      PULSE_CORE_BASE_URL: http://pulse-core:8091
      ML_SERVICE_URL: http://ml:9000
      GIGACHAT_AUTH_KEY: ${GIGACHAT_AUTH_KEY:-}
      GIGACHAT_ACCESS_TOKEN: ${GIGACHAT_ACCESS_TOKEN:-}
    ports:
      - "${BACKEND_PUBLISH_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  admin-panel:
    profiles: ["core"]
    image: comit-admin-panel:latest
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    environment:
      # Тот же DSN, что у backend — одна БД для FastAPI и Django admin.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-comit}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-comit}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-unsafe-dev-key-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin12345}
      WEB_CONCURRENCY: ${ADMIN_PANEL_WEB_CONCURRENCY:-2}
    ports:
      - "${ADMIN_PANEL_PORT:-8010}:8001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health/')",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    profiles: ["core"]
    image: comit-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-backend}
      BACKEND_PORT: ${BACKEND_UPSTREAM_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
      - qmsg-core
    restart: unless-stopped

  frontend-analytics:
    profiles: ["core"]
    image: comit-frontend-analytics:latest
    build:
      context: ./frontend_analytics
      dockerfile: Dockerfile
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-backend}
      BACKEND_PORT: ${BACKEND_UPSTREAM_PORT:-8000}
    ports:
      - "${FRONTEND_ANALYTICS_PORT:-8081}:80"
    depends_on:
      - backend
    restart: unless-stopped

  hackathon-parser:
    profiles: ["core"]
    image: comit-hackathon-parser:latest
    build:
      context: ./hackathon-parser
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-comit}
      PARSE_INTERVAL_HOURS: ${PARSE_INTERVAL_HOURS:-1}
      NEWS_PARSE_INTERVAL_HOURS: ${NEWS_PARSE_INTERVAL_HOURS:-2}
    ports:
      - "${HACKATHON_PARSER_PORT:-8012}:8012"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  pulse-core:
    profiles: ["core"]
    image: comit-pulse-core:latest
    build:
      context: ./PulseCore
      dockerfile: Dockerfile
    environment:
      MONGO_URL: mongodb://mongo:27017/
    ports:
      - "${PULSE_CORE_PORT:-8091}:8091"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  qmsg-core:
    profiles: ["core"]
    image: comit-qmsg-core:latest
    build:
      context: ./QmsgCore/backend
      dockerfile: Dockerfile
    environment:
      GC_DATABASE_DSN: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-comit}
      GC_JWT_SECRET: ${JWT_SECRET:-disabled-core-jwt-secret}
      GC_PULSE_BASE_URL: http://pulse-core:8091
      GC_SERVER_PORT: 8090
    ports:
      - "${QMSG_CORE_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8090/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
      pulse-core:
        condition: service_healthy
    restart: unless-stopped

  ml:
    profiles: ["core"]
    image: comit-ml:latest
    build:
      context: ./ML
      dockerfile: Dockerfile
    environment:
      GIGACHAT_AUTH_KEY: ${GIGACHAT_AUTH_KEY:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-comit}
    volumes:
      - ml_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  ml_data:
  frontend_node_modules:

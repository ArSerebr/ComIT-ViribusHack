openapi: 3.1.0
info:
  title: ComIT Viribus API
  description: REST API для SPA (без эндпоинтов ИИ-чата)
  version: 1.0.0
paths:
  /api/auth/jwt/login:
    post:
      tags:
      - auth
      summary: Auth:Jwt.Login
      operationId: auth_jwt_login_api_auth_jwt_login_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_auth_jwt_login_api_auth_jwt_login_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BearerResponse'
              example:
                access_token: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjoiOTIyMWZmYzktNjQwZi00MzcyLTg2ZDMtY2U2NDJjYmE1NjAzIiwiYXVkIjoiZmFzdGFwaS11c2VyczphdXRoIiwiZXhwIjoxNTcxNTA0MTkzfQ.M10bjOe45I5Ncu_uXvOmVV8QxnL-nZfcH96U90JaocI
                token_type: bearer
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                LOGIN_BAD_CREDENTIALS:
                  summary: Bad credentials or the user is inactive.
                  value:
                    detail: LOGIN_BAD_CREDENTIALS
                LOGIN_USER_NOT_VERIFIED:
                  summary: The user is not verified.
                  value:
                    detail: LOGIN_USER_NOT_VERIFIED
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/jwt/logout:
    post:
      tags:
      - auth
      summary: Auth:Jwt.Logout
      operationId: auth_jwt_logout_api_auth_jwt_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '401':
          description: Missing token or inactive user.
      security:
      - OAuth2PasswordBearer: []
  /api/auth/register:
    post:
      tags:
      - auth
      summary: Register:Register
      operationId: register_register_api_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                REGISTER_USER_ALREADY_EXISTS:
                  summary: A user with this email already exists.
                  value:
                    detail: REGISTER_USER_ALREADY_EXISTS
                REGISTER_INVALID_PASSWORD:
                  summary: Password validation failed.
                  value:
                    detail:
                      code: REGISTER_INVALID_PASSWORD
                      reason: Password should beat least 3 characters
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/users/me:
    get:
      tags:
      - users
      summary: Users:Current User
      operationId: users_current_user_api_users_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '401':
          description: Missing token or inactive user.
      security:
      - OAuth2PasswordBearer: []
    patch:
      tags:
      - users
      summary: Users:Patch Current User
      operationId: users_patch_current_user_api_users_me_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '401':
          description: Missing token or inactive user.
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                UPDATE_USER_EMAIL_ALREADY_EXISTS:
                  summary: A user with this email already exists.
                  value:
                    detail: UPDATE_USER_EMAIL_ALREADY_EXISTS
                UPDATE_USER_INVALID_PASSWORD:
                  summary: Password validation failed.
                  value:
                    detail:
                      code: UPDATE_USER_INVALID_PASSWORD
                      reason: Password should beat least 3 characters
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/users/{id}:
    get:
      tags:
      - users
      summary: Users:User
      operationId: users_user_api_users__id__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '401':
          description: Missing token or inactive user.
        '403':
          description: Not a superuser.
        '404':
          description: The user does not exist.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - users
      summary: Users:Patch User
      operationId: users_patch_user_api_users__id__patch
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '401':
          description: Missing token or inactive user.
        '403':
          description: Not a superuser.
        '404':
          description: The user does not exist.
        '400':
          content:
            application/json:
              examples:
                UPDATE_USER_EMAIL_ALREADY_EXISTS:
                  summary: A user with this email already exists.
                  value:
                    detail: UPDATE_USER_EMAIL_ALREADY_EXISTS
                UPDATE_USER_INVALID_PASSWORD:
                  summary: Password validation failed.
                  value:
                    detail:
                      code: UPDATE_USER_INVALID_PASSWORD
                      reason: Password should beat least 3 characters
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Bad Request
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - users
      summary: Users:Delete User
      operationId: users_delete_user_api_users__id__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      responses:
        '204':
          description: Successful Response
        '401':
          description: Missing token or inactive user.
        '403':
          description: Not a superuser.
        '404':
          description: The user does not exist.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/recommendations/like:
    post:
      tags:
      - analytics
      summary: Post Recommendation Like
      operationId: post_recommendation_like_api_recommendations_like_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LikePayload'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/library/interests:
    post:
      tags:
      - analytics
      summary: Post Library Interests
      operationId: post_library_interests_api_library_interests_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InterestsPayload'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/news/mini:
    get:
      tags:
      - news
      summary: Get News Mini
      operationId: get_news_mini_api_news_mini_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/NewsMiniItem'
                type: array
                title: Response Get News Mini Api News Mini Get
  /api/news/featured:
    get:
      tags:
      - news
      summary: Get News Featured
      operationId: get_news_featured_api_news_featured_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/FeaturedNewsItem'
                type: array
                title: Response Get News Featured Api News Featured Get
  /api/projects/hub:
    get:
      tags:
      - projects
      summary: Get Projects Hub
      operationId: get_projects_hub_api_projects_hub_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ProjectColumn'
                type: array
                title: Response Get Projects Hub Api Projects Hub Get
  /api/projects/{project_id}:
    get:
      tags:
      - projects
      summary: Get Project By Id
      operationId: get_project_by_id_api_projects__project_id__get
      parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          title: Project Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetails'
        '404':
          description: Проект не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/projects/{project_id}/join:
    post:
      tags:
      - projects
      summary: Post Project Join
      operationId: post_project_join_api_projects__project_id__join_post
      parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          title: Project Id
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinRequest'
              default: {}
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinResponse'
        '404':
          description: Проект не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/library:
    get:
      tags:
      - library
      summary: Get Library
      operationId: get_library_api_library_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryBundle'
  /api/notifications:
    get:
      tags:
      - notifications
      summary: Get Notifications
      operationId: get_notifications_api_notifications_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/NotificationItem'
                type: array
                title: Response Get Notifications Api Notifications Get
  /api/dashboard/recommendations:
    get:
      tags:
      - dashboard
      summary: Get Dashboard Recommendations
      operationId: get_dashboard_recommendations_api_dashboard_recommendations_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/RecommendationCard'
                type: array
                title: Response Get Dashboard Recommendations Api Dashboard Recommendations Get
  /api/dashboard/home:
    get:
      tags:
      - dashboard
      summary: Get Dashboard Home
      operationId: get_dashboard_home_api_dashboard_home_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardHome'
        '404':
          description: Конфиг главной не задан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
components:
  schemas:
    ArticleTag:
      properties:
        id:
          type: string
          title: Id
        label:
          type: string
          title: Label
        tone:
          type: string
          title: Tone
      type: object
      required:
      - id
      - label
      - tone
      title: ArticleTag
    BearerResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        token_type:
          type: string
          title: Token Type
      type: object
      required:
      - access_token
      - token_type
      title: BearerResponse
    Body_auth_jwt_login_api_auth_jwt_login_post:
      properties:
        grant_type:
          anyOf:
          - type: string
            pattern: ^password$
          - type: 'null'
          title: Grant Type
        username:
          type: string
          title: Username
        password:
          type: string
          format: password
          title: Password
        scope:
          type: string
          title: Scope
          default: ''
        client_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Client Id
        client_secret:
          anyOf:
          - type: string
          - type: 'null'
          format: password
          title: Client Secret
      type: object
      required:
      - username
      - password
      title: Body_auth_jwt_login_api_auth_jwt_login_post
    DashboardHome:
      properties:
        events:
          $ref: '#/components/schemas/DashboardHomeEvents'
        productivity:
          $ref: '#/components/schemas/DashboardHomeProductivity'
        highlightCourse:
          $ref: '#/components/schemas/DashboardHomeCourse'
      type: object
      required:
      - events
      - productivity
      - highlightCourse
      title: DashboardHome
    DashboardHomeCourse:
      properties:
        title:
          type: string
          title: Title
        imageUrl:
          type: string
          title: Imageurl
        path:
          type: string
          title: Path
      type: object
      required:
      - title
      - imageUrl
      - path
      title: DashboardHomeCourse
    DashboardHomeEvents:
      properties:
        count:
          type: integer
          title: Count
        deltaLabel:
          type: string
          title: Deltalabel
      type: object
      required:
      - count
      - deltaLabel
      title: DashboardHomeEvents
    DashboardHomeProductivity:
      properties:
        value:
          type: string
          title: Value
        deltaLabel:
          type: string
          title: Deltalabel
      type: object
      required:
      - value
      - deltaLabel
      title: DashboardHomeProductivity
    ErrorDetail:
      properties:
        detail:
          type: string
          title: Detail
      type: object
      required:
      - detail
      title: ErrorDetail
      description: Тело ответа HTTPException (например 404).
    ErrorModel:
      properties:
        detail:
          anyOf:
          - type: string
          - additionalProperties:
              type: string
            type: object
          title: Detail
      type: object
      required:
      - detail
      title: ErrorModel
    FeaturedNewsItem:
      properties:
        id:
          type: string
          title: Id
        title:
          type: string
          title: Title
        subtitle:
          type: string
          title: Subtitle
        description:
          type: string
          title: Description
        imageUrl:
          type: string
          title: Imageurl
        ctaLabel:
          type: string
          title: Ctalabel
        detailsUrl:
          type: string
          title: Detailsurl
      type: object
      required:
      - id
      - title
      - subtitle
      - description
      - imageUrl
      - ctaLabel
      - detailsUrl
      title: FeaturedNewsItem
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HubProject:
      properties:
        id:
          type: string
          title: Id
        code:
          type: string
          title: Code
        title:
          type: string
          title: Title
        description:
          type: string
          title: Description
        teamName:
          type: string
          title: Teamname
        updatedLabel:
          type: string
          title: Updatedlabel
        teamAvatarUrl:
          type: string
          title: Teamavatarurl
        detailsUrl:
          type: string
          title: Detailsurl
        visibility:
          anyOf:
          - type: string
            enum:
            - public
            - private
          - type: 'null'
          title: Visibility
        isHot:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Ishot
      type: object
      required:
      - id
      - code
      - title
      - description
      - teamName
      - updatedLabel
      - teamAvatarUrl
      - detailsUrl
      title: HubProject
    IntegrationItem:
      properties:
        id:
          type: string
          title: Id
        brand:
          type: string
          title: Brand
        description:
          type: string
          title: Description
        statusLabel:
          type: string
          title: Statuslabel
        connectedSince:
          type: string
          title: Connectedsince
      type: object
      required:
      - id
      - brand
      - description
      - statusLabel
      - connectedSince
      title: IntegrationItem
    InterestOption:
      properties:
        id:
          type: string
          title: Id
        label:
          type: string
          title: Label
        selected:
          type: boolean
          title: Selected
      type: object
      required:
      - id
      - label
      - selected
      title: InterestOption
    InterestsPayload:
      properties:
        interests:
          items:
            type: string
          type: array
          title: Interests
        ts:
          type: integer
          title: Ts
      type: object
      required:
      - interests
      - ts
      title: InterestsPayload
    JoinRequest:
      properties:
        message:
          anyOf:
          - type: string
          - type: 'null'
          title: Message
      type: object
      title: JoinRequest
    JoinResponse:
      properties:
        ok:
          type: boolean
          title: Ok
          default: true
        project_id:
          type: string
          title: Project Id
      type: object
      required:
      - project_id
      title: JoinResponse
    LibraryArticle:
      properties:
        id:
          type: string
          title: Id
        tags:
          items:
            $ref: '#/components/schemas/ArticleTag'
          type: array
          title: Tags
        title:
          type: string
          title: Title
        description:
          type: string
          title: Description
        authorName:
          type: string
          title: Authorname
        authorAvatarUrl:
          type: string
          title: Authoravatarurl
      type: object
      required:
      - id
      - tags
      - title
      - description
      - authorName
      - authorAvatarUrl
      title: LibraryArticle
    LibraryBundle:
      properties:
        showcaseItems:
          items:
            $ref: '#/components/schemas/LibraryShowcaseItem'
          type: array
          title: Showcaseitems
        interestOptions:
          items:
            $ref: '#/components/schemas/InterestOption'
          type: array
          title: Interestoptions
        articles:
          items:
            $ref: '#/components/schemas/LibraryArticle'
          type: array
          title: Articles
      type: object
      required:
      - showcaseItems
      - interestOptions
      - articles
      title: LibraryBundle
    LibraryHero:
      properties:
        id:
          type: string
          title: Id
        title:
          type: string
          title: Title
        updatedLabel:
          type: string
          title: Updatedlabel
        providerLabel:
          type: string
          title: Providerlabel
        description:
          type: string
          title: Description
      type: object
      required:
      - id
      - title
      - updatedLabel
      - providerLabel
      - description
      title: LibraryHero
    LibraryShowcaseItem:
      properties:
        id:
          type: string
          title: Id
        brandLabel:
          type: string
          title: Brandlabel
        eyebrow:
          type: string
          title: Eyebrow
        title:
          type: string
          title: Title
        imageUrl:
          type: string
          title: Imageurl
        hero:
          $ref: '#/components/schemas/LibraryHero'
      type: object
      required:
      - id
      - brandLabel
      - eyebrow
      - title
      - imageUrl
      - hero
      title: LibraryShowcaseItem
    LikePayload:
      properties:
        entity:
          type: string
          enum:
          - recommendation
          - news
          title: Entity
        id:
          type: string
          title: Id
        ts:
          type: integer
          title: Ts
      type: object
      required:
      - entity
      - id
      - ts
      title: LikePayload
    NewsMiniItem:
      properties:
        id:
          type: string
          title: Id
        title:
          type: string
          title: Title
        imageUrl:
          type: string
          title: Imageurl
        detailsUrl:
          type: string
          title: Detailsurl
      type: object
      required:
      - id
      - title
      - imageUrl
      - detailsUrl
      title: NewsMiniItem
    NotificationItem:
      properties:
        id:
          type: string
          title: Id
        type:
          type: string
          title: Type
        title:
          type: string
          title: Title
        dateLabel:
          type: string
          title: Datelabel
        dateCaption:
          type: string
          title: Datecaption
        unread:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Unread
        authorLabel:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorlabel
        authorName:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorname
        accentText:
          anyOf:
          - type: string
          - type: 'null'
          title: Accenttext
        ctaLabel:
          anyOf:
          - type: string
          - type: 'null'
          title: Ctalabel
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
      type: object
      required:
      - id
      - type
      - title
      - dateLabel
      - dateCaption
      title: NotificationItem
    OkResponse:
      properties:
        ok:
          type: boolean
          title: Ok
          default: true
      type: object
      title: OkResponse
    ParticipantRow:
      properties:
        id:
          type: string
          title: Id
        name:
          type: string
          title: Name
        avatarUrl:
          type: string
          title: Avatarurl
        avatarVariant:
          type: string
          title: Avatarvariant
        comitId:
          anyOf:
          - type: string
          - type: 'null'
          title: Comitid
        timeInProject:
          anyOf:
          - type: string
          - type: 'null'
          title: Timeinproject
        role:
          anyOf:
          - type: string
          - type: 'null'
          title: Role
        status:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
        lastTask:
          anyOf:
          - type: string
          - type: 'null'
          title: Lasttask
      type: object
      required:
      - id
      - name
      - avatarUrl
      - avatarVariant
      title: ParticipantRow
    PersonPreview:
      properties:
        id:
          type: string
          title: Id
        name:
          type: string
          title: Name
        avatarUrl:
          type: string
          title: Avatarurl
        avatarVariant:
          type: string
          title: Avatarvariant
      type: object
      required:
      - id

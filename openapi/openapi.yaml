components:
  schemas:
    ArticleTag:
      properties:
        id:
          type: string
          title: Id
        label:
          type: string
          title: Label
        tone:
          type: string
          title: Tone
      type: object
      required:
      - id
      - label
      - tone
      title: ArticleTag
    BearerResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        token_type:
          type: string
          title: Token Type
      type: object
      required:
      - access_token
      - token_type
      title: BearerResponse
    Body_auth_jwt_login_api_auth_jwt_login_post:
      properties:
        grant_type:
          anyOf:
          - type: string
            pattern: ^password$
          - type: 'null'
          title: Grant Type
        username:
          type: string
          title: Username
        password:
          type: string
          format: password
          title: Password
        scope:
          type: string
          title: Scope
          default: ''
        client_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Client Id
        client_secret:
          anyOf:
          - type: string
          - type: 'null'
          format: password
          title: Client Secret
      type: object
      required:
      - username
      - password
      title: Body_auth_jwt_login_api_auth_jwt_login_post
    DashboardHome:
      properties:
        events:
          $ref: '#/components/schemas/DashboardHomeEvents'
        productivity:
          $ref: '#/components/schemas/DashboardHomeProductivity'
        highlightCourse:
          $ref: '#/components/schemas/DashboardHomeCourse'
      type: object
      required:
      - events
      - productivity
      - highlightCourse
      title: DashboardHome
    DashboardHomeCourse:
      properties:
        title:
          type: string
          title: Title
        imageUrl:
          type: string
          title: Imageurl
        path:
          type: string
          title: Path
      type: object
      required:
      - title
      - imageUrl
      - path
      title: DashboardHomeCourse
    DashboardHomeEvents:
      properties:
        count:
          type: integer
          title: Count
        deltaLabel:
          type: string
          title: Deltalabel
      type: object
      required:
      - count
      - deltaLabel
      title: DashboardHomeEvents
    DashboardHomeProductivity:
      properties:
        value:
          type: string
          title: Value
        deltaLabel:
          type: string
          title: Deltalabel
      type: object
      required:
      - value
      - deltaLabel
      title: DashboardHomeProductivity
    ErrorDetail:
      properties:
        detail:
          type: string
          title: Detail
      type: object
      required:
      - detail
      title: ErrorDetail
      description: Тело ответа HTTPException (например 404).
    ErrorModel:
      properties:
        detail:
          anyOf:
          - type: string
          - additionalProperties:
              type: string
            type: object
          title: Detail
      type: object
      required:
      - detail
      title: ErrorModel
    FeaturedNewsItem:
      properties:
        id:
          type: string
          title: Id
        title:
          type: string
          title: Title
        subtitle:
          type: string
          title: Subtitle
        description:
          type: string
          title: Description
        imageUrl:
          type: string
          title: Imageurl
        ctaLabel:
          type: string
          title: Ctalabel
        detailsUrl:
          type: string
          title: Detailsurl
        participated:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Participated
      type: object
      required:
      - id
      - title
      - subtitle
      - description
      - imageUrl
      - ctaLabel
      - detailsUrl
      title: FeaturedNewsItem
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
